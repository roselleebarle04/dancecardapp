<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dance Card{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background-color: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background-color: #16213e;
            border: 3px solid #0f3460;
            padding: 40px;
            text-align: center;
        }
        h1 { margin-bottom: 30px; font-size: 2em; }
        h2 { margin-bottom: 20px; font-size: 1.5em; }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 0.9em;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            font-family: 'Courier New', monospace;
            background-color: #0f3460;
            border: 2px solid #e94560;
            color: #eee;
            font-size: 1em;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #00d4ff;
            background-color: #1a3a52;
        }
        button {
            background-color: #e94560;
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            margin-top: 10px;
        }
        button:hover { background-color: #ff6b7a; }
        a {
            color: #00d4ff;
            text-decoration: none;
            cursor: pointer;
        }
        a:hover { text-decoration: underline; }
        .error {
            background-color: #8b0000;
            border: 2px solid #e94560;
            padding: 15px;
            margin-bottom: 20px;
            color: #fcc;
        }
        .success {
            background-color: #006400;
            border: 2px solid #00d4ff;
            padding: 15px;
            margin-bottom: 20px;
        }
        .link-text { margin-top: 20px; }
        .qr-section {
            background-color: #0f3460;
            padding: 20px;
            border: 2px solid #00d4ff;
            margin: 20px 0;
        }
        img.qr { max-width: 300px; margin: 20px 0; }
        .connections-list {
            text-align: left;
            margin-top: 30px;
        }
        .connection-item {
            background-color: #0f3460;
            border-left: 3px solid #e94560;
            padding: 15px;
            margin: 10px 0;
        }
        .connection-item strong { color: #00d4ff; }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
