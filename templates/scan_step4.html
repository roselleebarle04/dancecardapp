{% extends "base.html" %}

{% block title %}Add to Your Dance Card{% endblock %}

{% block content %}
<h1>🤝 One More Thing!</h1>
<h2>Add {{ owner_name }} to YOUR dance card?</h2>

<div class="success">
    <p>You've been added to {{ owner_name }}'s connections!</p>
    <p>Would you like to add them to yours as well?</p>
</div>

<div style="margin: 30px 0; display: flex; gap: 20px; justify-content: center;">
    <form method="post" action="/s/{{ token }}/add-to-my-card" style="display: inline;">
        <button type="submit" style="background-color: #e94560; color: #fff; padding: 12px 30px; border: none; font-weight: bold; cursor: pointer; font-size: 16px;">Yes, Add Them</button>
    </form>
    <a href="/dashboard" style="display: inline-flex; align-items: center; justify-content: center; background-color: #666; color: #fff; padding: 12px 30px; text-decoration: none; font-weight: bold; height: 20px;">Skip</a>
</div>
<div class="link-text"><a href="/">Back to Home</a></div>
{% endblock %}
