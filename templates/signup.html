{% extends "base.html" %}

{% block title %}Sign Up - Dance Card{% endblock %}

{% block content %}
<h1>✨ Dance Card ✨</h1>
<h2>Create Your Profile</h2>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="post">
    <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
    </div>

    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
    </div>

    <div class="form-group">
        <label for="bio">Bio (optional)</label>
        <textarea id="bio" name="bio" rows="3" placeholder="Tell us about yourself..."></textarea>
    </div>

    <div class="form-group">
        <label for="website">Website (optional)</label>
        <input type="url" id="website" name="website" placeholder="https://...">
    </div>

    <div class="form-group">
        <label for="linkedin_url">LinkedIn (optional)</label>
        <div style="display: flex; align-items: center; gap: 0;">
            <span style="background: #0f3460; color: #aaa; padding: 10px; border: 1px solid #333; border-right: none; white-space: nowrap;">linkedin.com/in/</span>
            <input type="text" id="linkedin_url" name="linkedin_url" placeholder="yourhandle" style="flex: 1; border-left: none;">
        </div>
    </div>

    <button type="submit">Create Account</button>
</form>

<div class="link-text">
    Already have an account? <a href="/login">Log in here</a>
</div>
{% endblock %}
